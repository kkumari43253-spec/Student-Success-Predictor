<!DOCTYPE html>
<html>
<head>
    <title>Student Success Predictor</title>

    <style>

        body{
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }


        .card{
            background:white;
            width:420px;
            padding:35px;
            border-radius:20px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.2);
            text-align:center;
        }


        h1{
            color:#333;
        }


        input{
            width:90%;
            padding:12px;
            margin:10px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:15px;
        }


        button{
            width:95%;
            padding:12px;
            margin-top:15px;
            background:#667eea;
            color:white;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
        }


        button:hover{
            background:#5563c1;
        }


        .result{
            margin-top:25px;
            padding:20px;
            background:#f1f8ff;
            border-radius:15px;
        }


        .score{
            font-size:28px;
            color:#667eea;
            font-weight:bold;
        }


        .grade{
            font-size:22px;
            color:green;
            font-weight:bold;
        }


    </style>

</head>


<body>


<div class="card">


<h1>🎓 Student Success Predictor</h1>

<p>
AI Based Performance Prediction System
</p>


<form action="/predict" method="POST">


<input type="number" step="0.1"
name="study_hours"
placeholder="📚 Study Hours per Day"
required>


<input type="number"
name="attendance"
placeholder="📅 Attendance Percentage"
required>


<input type="number"
name="previous_marks"
placeholder="📝 Previous Marks"
required>


<input type="number"
name="assignment"
placeholder="✅ Assignment Completion"
required>


<button>
Predict Performance
</button>


</form>



{% if prediction %}

<div class="result">

<h2>Prediction Result</h2>


<div class="score">
{{prediction}}%
</div>


<p>Final Score</p>


<div class="grade">
Grade: {{grade}}
</div>


<p>
💡 {{message}}
</p>

<p>Performance: {{level}}</p>

<p>Success Probability: {{probability}}%</p>

<p>Risk Level: {{risk}}</p>

</div>


{% endif %}


</div>


</body>
</html>
